<div class="container">
  <h2>Active Couriers</h2>

  <div *ngIf="loading" class="spinner-container">
    <mat-spinner></mat-spinner>
  </div>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" *ngIf="!loading">

    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> ID </th>
      <td mat-cell *mat-cellDef="let courier"> {{courier.id}} </td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Name </th>
      <td mat-cell *mat-cellDef="let courier"> {{courier.name}} </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *mat-cellDef="let courier">
        <span class="status-badge" [ngClass]="courier.status">
          {{courier.status}}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="location">
      <th mat-header-cell *matHeaderCellDef> Coordinates </th>
      <td mat-cell *mat-cellDef="let courier">
        {{courier.currentLocation.coordinates[1]}}, {{courier.currentLocation.coordinates[0]}}
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *mat-rowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <div style="margin-top: 20px;">
    <button mat-raised-button color="primary" (click)="loadData()">Refresh Data</button>
  </div>
</div>
